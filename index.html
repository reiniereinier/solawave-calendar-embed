<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Calendly Embed</title>

  <link
    href="https://assets.calendly.com/assets/external/widget.css"
    rel="stylesheet"
  />

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
    }

    .calendly-wrapper {
      width: 100%;
      height: 100vh;
    }

    #calendly-popup-embed {
      width: 100%;
      height: 100%;
    }

    .calendly-inline-widget {
      width: 100% !important;
      height: 100% !important;
      min-width: 100% !important;
    }

    iframe {
      width: 100% !important;
      height: 100% !important;
    }

    @media only screen and (max-width: 767px) {
      .calendly-wrapper {
        height: 100vh;
        min-height: 100vh;
      }

      body {
        overflow: auto;
      }
    }
  </style>
</head>
<body>
  <div class="calendly-wrapper">
    <div
      class="calendly-inline-widget"
      id="calendly-popup-embed"
    ></div>
  </div>

  <script
    src="https://assets.calendly.com/assets/external/widget.js"
    async
  ></script>

  <script>
    window.addEventListener("load", function () {
      Calendly.initInlineWidget({
        url: "https://calendly.com/mary-terterian-solawave/30min?hide_gdpr_banner=1",
        parentElement: document.getElementById("calendly-popup-embed"),
        resize: true
      });
    });
  </script>
</body>
</html>
