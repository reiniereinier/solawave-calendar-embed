<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Calendly Embed</title>

  <link
    href="https://assets.calendly.com/assets/external/widget.css"
    rel="stylesheet"
  />

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .calendly-wrapper {
      width: 100%;
      height: 100vh;
      min-height: 600px;
    }

    #calendly-popup-embed {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="calendly-wrapper">
    <div id="calendly-popup-embed"></div>
  </div>

  <script
    src="https://assets.calendly.com/assets/external/widget.js"
    async
  ></script>

  <script>
    window.addEventListener("load", function () {
      Calendly.initInlineWidget({
        url: "https://calendly.com/mary-terterian-solawave/30min?hide_gdpr_banner=1",
        parentElement: document.getElementById("calendly-popup-embed"),
        resize: true
      });
    });
  </script>
</body>
</html>
