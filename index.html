<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Calendly Embed</title>

  <link
    href="https://assets.calendly.com/assets/external/widget.css"
    rel="stylesheet"
  />

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #fff;
    }

    .calendly-wrapper {
      width: 100%;
      height: 100vh;
      min-height: 900px;
    }

    .calendly-inline-widget {
      width: 100%;
      height: 100%;
      min-height: 900px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    @media only screen and (max-width: 767px) {
      .calendly-wrapper {
        min-height: 700px;
      }

      .calendly-inline-widget {
        min-height: 700px;
      }
    }
  </style>
</head>
<body>
  <div class="calendly-wrapper">
    <div
      class="calendly-inline-widget"
      data-url="https://calendly.com/mary-terterian-solawave/30min?hide_gdpr_banner=1"
    ></div>
  </div>

  <script
    src="https://assets.calendly.com/assets/external/widget.js"
    async
  ></script>
</body>
</html>
