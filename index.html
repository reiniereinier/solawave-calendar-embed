<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Calendly Embed</title>

  <link
    href="https://assets.calendly.com/assets/external/widget.css"
    rel="stylesheet"
  />

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: #ffffff;
    }

    .calendly-inline-widget {
      width: 100%;
      height: 1100px;
      min-height: 1100px;
    }

    @media only screen and (max-width: 767px) {
      .calendly-inline-widget {
        height: 1200px;
        min-height: 1200px;
      }
    }
  </style>
</head>
<body>
  <div
    class="calendly-inline-widget"
    data-url="https://calendly.com/mary-terterian-solawave/30min?hide_gdpr_banner=1"
  ></div>

  <script
    type="text/javascript"
    src="https://assets.calendly.com/assets/external/widget.js"
  ></script>
</body>
</html>
